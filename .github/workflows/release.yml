name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rust: stable
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            rust: stable
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            rust: stable
          - os: macos-latest
            target: x86_64-apple-darwin
            rust: stable
          - os: macos-latest
            target: aarch64-apple-darwin
            rust: stable
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rust: stable

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install cross (Linux musl / aarch64 only)
        if: contains(matrix.target, 'linux') && (contains(matrix.target, 'musl') || contains(matrix.target, 'aarch64'))
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: "!(contains(matrix.target, 'linux') && (contains(matrix.target, 'musl') || contains(matrix.target, 'aarch64')))"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: contains(matrix.target, 'linux') && (contains(matrix.target, 'musl') || contains(matrix.target, 'aarch64'))
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ast-bro-${{ matrix.target }}.tar.gz ast-bro ast-outline sb

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a -tzip ../../../ast-bro-${{ matrix.target }}.zip ast-bro.exe ast-outline.exe sb.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ast-bro-${{ matrix.target }}
          path: ast-bro-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
